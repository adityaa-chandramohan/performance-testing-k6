version: '3.8'

# ─── Stack ────────────────────────────────────────────────────────────────────
# api         → Express API with /metrics endpoint (prom-client)
# prometheus  → Scrapes api + cAdvisor; receives k6 remote-write
# cadvisor    → Exports container CPU / memory / network metrics
# grafana     → Pre-provisioned dashboard: k6 load + API system metrics
# k6          → Runs load test, pushes metrics to Prometheus via remote-write
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Target API ──────────────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: perf_api
    ports:
      - "3000:3000"
    networks:
      - perf_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: perf_prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver   # accepts k6 push
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - perf_net
    depends_on:
      - api

  # ── cAdvisor (container system metrics) ─────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: perf_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - perf_net
    privileged: true

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: perf_grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - perf_net
    depends_on:
      - prometheus

  # ── k6 load test ─────────────────────────────────────────────────────────────
  # Runs once and exits. Override the script via K6_SCRIPT env var.
  # To run: docker compose run --rm k6
  k6:
    image: grafana/k6:0.51.0
    container_name: perf_k6
    environment:
      BASE_URL: http://api:3000
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_STATS: p(50),p(95),p(99),max
    volumes:
      - ./k6:/scripts
    command: run --out=experimental-prometheus-rw /scripts/test.js
    networks:
      - perf_net
    depends_on:
      api:
        condition: service_healthy
      prometheus:
        condition: service_started

# ─── Volumes & Networks ───────────────────────────────────────────────────────

volumes:
  prometheus_data:
  grafana_data:

networks:
  perf_net:
    driver: bridge
